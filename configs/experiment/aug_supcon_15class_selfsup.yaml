# @package _global_

# Experiment: Augmented Self-Supervised Contrastive Learning for 15-class COLLIDE2V
#
# Note:
# - Contrastive positives are augmented views of the same instance.

defaults:
  - override /data: collide2v_minicineca
  - override /model: augmented_selfsupcon
  - override /callbacks: supcon
  - override /trainer: gpu

tags: ["collide2v", "augmented_supcon", "15class", "masking", "self_supervised"]

seed: 42

data:
  batch_size: 1024
  train_val_test_split_per_class: [100_000, 20_000, 20_000]
  label: "v2_15class_highlevel_reduced"
  num_workers: 7
  to_classify:
    - "QCD_inclusive"
    - "DY_to_ll"
    - "Z_to_vv_jet"
    - "Z_to_qq_uds"
    - "Z_to_bb"
    - "Z_to_cc"
    - "W_to_lv"
    - "W_to_qq"
    - "gamma"
    - "QCD_bb"
    - "tt_all-hadr"
    - "tt_semi-lept"
    - "tt_all-lept"
    - "Minbias_Soft_QCD"
    - "Upsilon_to_Leptons"
  datasets_config:
    jets:
      cols:
        - FullReco_JetPuppiAK4_PT
        - FullReco_JetPuppiAK4_Eta
        - FullReco_JetPuppiAK4_Phi
        - FullReco_JetPuppiAK4_Mass
        - FullReco_JetPuppiAK4_BTag
        - FullReco_JetPuppiAK4_Charge
        #- FullReco_JetPuppiAK4_NNeutrals
      topk: 12
      count: true

    electrons:
      cols:
        - FullReco_Electron_PT
        - FullReco_Electron_Eta
        - FullReco_Electron_Phi
        #- FullReco_Electron_Charge
        - FullReco_Electron_EhadOverEem
        - FullReco_Electron_IsolationVarRhoCorr
        #- FullReco_Electron_D0
        #- FullReco_Electron_DZ
      topk: 8
      count: false

    muons:
      cols:
        - FullReco_MuonTight_PT
        - FullReco_MuonTight_Eta
        - FullReco_MuonTight_Phi
        #- FullReco_MuonTight_Charge
        - FullReco_MuonTight_IsolationVarRhoCorr
        #- FullReco_MuonTight_D0
        #- FullReco_MuonTight_DZ
      topk: 8
      count: false

    photons:
      cols:
        - FullReco_PhotonTight_PT
        - FullReco_PhotonTight_Eta
        - FullReco_PhotonTight_Phi
        #- FullReco_PhotonTight_EhadOverEem
        #- FullReco_PhotonTight_IsolationVarRhoCorr
      topk: 8
      count: false

    puppi_met:
      cols:
        - FullReco_PUPPIMET_MET
        - FullReco_PUPPIMET_Phi
      topk: null
      count: false

model:
  # Keep explicit self-supervised switch for readability.
  self_supervised: true

trainer:
  min_epochs: 1
  max_epochs: 50
  max_steps: 50000

preprocess:
  enabled: true

callbacks:
  model_checkpoint:
    monitor: "val/con_loss"
    mode: "min"
    save_top_k: 1
    save_last: false
    filename: "epoch_{epoch:03d}_val_loss_{val/con_loss:.4f}"

  early_stopping:
    monitor: "val/con_loss"
    patience: 10
    mode: "min"

logger:
  mlflow:
    experiment_name: "augmented_supcon_pretraining"
    run_name: "aug_supcon_15class_selfsup"

eval_after_training: true

eval:
  linear_probe:
    max_epochs: 1
    lr: 0.001
    weight_decay: 0.0

  knn_probe:
    # Disable KNN probes by using an empty list
    k_values: []
    metric: 'cosine'
  # Visualization settings
  save_visualizations: true
  max_visualization_samples: 10000
  umap_n_neighbors: 15
  umap_min_dist: 0.1
  umap_metric: 'cosine'
  output_dir: ${paths.output_dir}/probe_evaluation
