# @package _global_

# Anomaly Detection: QCD (normal) vs Higgs (anomalies) using RAW FEATURES

defaults:
  - override /data: collide2v_minicineca
  - override /paths: fm_testing_cineca

# Mode
mode: "raw"

# Tags
tags: ["anomaly_detection", "qcd_vs_higgs", "raw_features", "baseline"]

# Normal class (training only on this)
normal_classes: [0]  # QCD_inclusive

# Anomaly classes (test these as anomalies)
anomaly_classes: [15, 17]  # VBFHbb, ggHtautau

# Data configuration for anomaly detection
data:
  batch_size: 512
  train_val_test_split_per_class: [1000, 200, 200]  # Adjusted to available data (~196k per class)
  label: "v2_18class_highlevel"
  
  to_classify:
    - "QCD_inclusive"
    - "DY_to_ll"
    - "Z_to_vv_jet"
    - "Z_to_qq_uds"
    - "Z_to_bb"
    - "Z_to_cc"
    - "W_to_lv"
    - "W_to_qq"
    - "gamma"
    - "QCD_bb"
    - "tt_all-hadr"
    - "tt_semi-lept"
    - "tt_all-lept"
    - "Minbias_Soft_QCD"
    - "Upsilon_to_Leptons"
    - "VBFHbb"
    - "ggHtautau"
  datasets_config:
    jets:
      cols:
        - FullReco_JetPuppiAK4_PT
        - FullReco_JetPuppiAK4_Eta
        - FullReco_JetPuppiAK4_Phi
        - FullReco_JetPuppiAK4_Mass
        - FullReco_JetPuppiAK4_BTag
        - FullReco_JetPuppiAK4_Charge
        #- FullReco_JetPuppiAK4_NNeutrals
      topk: 12
      count: true

    electrons:
      cols:
        - FullReco_Electron_PT
        - FullReco_Electron_Eta
        - FullReco_Electron_Phi
        #- FullReco_Electron_Charge
        - FullReco_Electron_EhadOverEem
        - FullReco_Electron_IsolationVarRhoCorr
        #- FullReco_Electron_D0
        #- FullReco_Electron_DZ
      topk: 8
      count: false

    muons:
      cols:
        - FullReco_MuonTight_PT
        - FullReco_MuonTight_Eta
        - FullReco_MuonTight_Phi
        #- FullReco_MuonTight_Charge
        - FullReco_MuonTight_IsolationVarRhoCorr
        #- FullReco_MuonTight_D0
        #- FullReco_MuonTight_DZ
      topk: 8
      count: false

    photons:
      cols:
        - FullReco_PhotonTight_PT
        - FullReco_PhotonTight_Eta
        - FullReco_PhotonTight_Phi
        #- FullReco_PhotonTight_EhadOverEem
        #- FullReco_PhotonTight_IsolationVarRhoCorr
      topk: 8
      count: false

    puppi_met:
      cols:
        - FullReco_PUPPIMET_MET
        - FullReco_PUPPIMET_Phi
      topk: null   # scalar values
      count: false

# Autoencoder hyperparameters
model:
  compression: 16  # Compression ratio (input_dim / bottleneck_dim)
  depth: 3  # Number of hidden layers (e.g., input → h1 → h2 → h3 → bottleneck)
  dropout: 0.1
  lr: 0.001
  weight_decay: 1e-5

# Trainer
trainer:
  max_epochs: 50
  gradient_clip_val: 1.0

# Preprocessing
preprocess:
  enabled: true

# Logger
logger:
  mlflow:
    run_name: "ae_qcd_vs_higgs_raw"
    experiment_name: "anomaly_detection"
