_target_: src.models.collide2v_tinytransformer.COLLIDE2VTransformerLitModule

d_model: 512
n_heads: 8
num_layers: 6
d_ff: 2048
dropout: 0.08
compile: false

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 1.73e-4
  weight_decay: 0.0167
  eps: 1e-09
  betas: [0.9, 0.999]

scheduler:
  _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
  _partial_: true
  mode: min
  factor: 0.2
  patience: 10
  threshold: 0.0001
  threshold_mode: rel
