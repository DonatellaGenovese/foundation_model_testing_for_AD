# Configuration for Augmented Self-Supervised Contrastive Learning (Aug-SelfSupCon)
# Uses instance discrimination with random masking augmentation.

_target_: src.models.collide2v_augmented_selfsupcon.COLLIDE2VAugmentedSelfSupConLitModule

# ============================================================
# ENCODER ARCHITECTURE (TinyTransformer)
# ============================================================
d_model: 512
n_heads: 8
num_layers: 6
d_ff: 2048
dropout: 0.08

# ============================================================
# PROJECTION HEAD (for contrastive learning)
# ============================================================
projection_dim: 64
hidden_projection_dim: 256

# ============================================================
# AUGMENTATION PARAMETERS
# ============================================================
mask_probability: 0.2
mask_full_particle: false
num_augmentations: 2

# ============================================================
# CONTRASTIVE LOSS PARAMETERS
# ============================================================
temperature: 0.07
base_temperature: 0.07

# Self-supervised mode selector (kept for compatibility)
self_supervised: true

# ============================================================
# CLASSIFICATION HEAD (optional, off by default)
# ============================================================
use_classification_head: false
classification_weight: 0.0
allow_single_class_batches: true

# ============================================================
# OPTIMIZATION
# ============================================================
compile: false

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 1.73e-4
  weight_decay: 0.0167
  eps: 1e-09
  betas: [0.9, 0.999]

scheduler:
  _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
  _partial_: true
  mode: min
  factor: 0.2
  patience: 10
  threshold: 0.0001
  threshold_mode: rel
  T_max: null
  eta_min: null
